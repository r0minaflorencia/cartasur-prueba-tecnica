<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-light p-4">

    <div class="container-fluid">

        <div class="mb-4 pb-3 border-bottom text-center">
            <img src="./img/01-logo-cartasur-sin-slogan-scaled.webp" alt="Banner-CartaSur" class="img-fluid rounded shadow-sm d-block mx-auto" style="max-width: 300px; height: auto;">
        </div>

        <div class="row g-4">
            
            <div class="col-md-3 d-flex flex-column gap-3">
                <div class="card panel-bordeado h-100">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center py-4">
                        <h5 class="card-title text-muted text-center">Empleados activos</h5>
                        <h2 id="contador-activos" class="display-4 text-secondary fw-bold mb-0">0</h2>
                    </div>
                </div>
                
                <div class="card panel-bordeado h-100">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center py-4">
                        <h5 class="card-title text-muted text-center">Empleados inactivos</h5>
                        <h2 id="contador-inactivos" class="display-4 text-danger fw-bold mb-0">0</h2>
                    </div>
                </div>

                <div class="card panel-bordeado">
                    <div class="card-body text-center">
                        <h6 class="card-title text-muted mb-2">Servidor CartaSur</h6>
                        <span id="api-status" class="badge bg-secondary p-2 w-100">Consultando...</span>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="card panel-bordeado h-100">
                    <div class="card-body">
                        <h3 class="card-title mb-4">Gestión de empleados</h3>
                        
                        <form id="form-empleado" class="row g-3 mb-4 bg-white p-3 border rounded shadow-sm">
                            <div class="col-md-4">
                                <input type="text" id="nombre" class="form-control" placeholder="Nombre" required>
                            </div>
                            <div class="col-md-4">
                                <input type="text" id="apellido" class="form-control" placeholder="Apellido" required>
                            </div>
                            <div class="col-md-3">
                                <select id="estado" class="form-select">
                                    <option value="activo">Activo</option>
                                    <option value="inactivo">Inactivo</option>
                                </select>
                            </div>
                            <div class="col-md-1">
                                <button type="submit" class="btn btn-secondary w-100 fw-bold" title="Agregar empleado">+</button>
                            </div>
                        </form>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Apellido</th>
                                        <th>Estado</th>
                                        <th>Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-empleados">
                                    </tbody>
                            </table>
                            <p id="mensaje-vacio" class="text-center text-muted mt-4">Aún no hay empleados registrados.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
